name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Build Next.js App
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Provide dummy env variables in case of build-time checks or prerendering
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXTAUTH_SECRET: dummy-secret-key-at-least-32-characters-long
          NEXTAUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: dummy-google-id
          GOOGLE_CLIENT_SECRET: dummy-google-secret
          GITHUB_ID: dummy-github-id
          GITHUB_SECRET: dummy-github-secret
          UPSTASH_REDIS_REST_URL: https://dummy-redis.upstash.io
          UPSTASH_REDIS_REST_TOKEN: dummy-redis-token

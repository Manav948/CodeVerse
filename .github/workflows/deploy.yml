name: Deploy to Production

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH || '~/code-verse' }}

      - name: Deploy and Restart via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Navigate to deploy directory
            cd ${{ secrets.DEPLOY_PATH || '~/code-verse' }}

            # Log in to GitHub Container Registry on the remote VPS
            # Note: GHCR_PULL_TOKEN should be a GitHub PAT with 'read:packages' permission
            echo "${{ secrets.GHCR_PULL_TOKEN || secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest Docker images from GHCR
            docker compose -f docker-compose.prod.yml pull

            # Start/recreate the production containers
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old unused images to save disk space on the host
            docker image prune -af
